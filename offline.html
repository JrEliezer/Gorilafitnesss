<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorila Fitness | Offline</title>
    <meta name="theme-color" content="#0a0a0a">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .offline-container {
            max-width: 500px;
        }
        .offline-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            opacity: 0.5;
        }
        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }
        p {
            color: #888;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            background: #39ff14;
            color: #000;
            padding: 0.8rem 2rem;
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn:hover {
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">&#128268;</div>
        <h1>Você está offline</h1>
        <p>Parece que você perdeu a conexão com a internet. Verifique sua conexão e tente novamente.</p>
        <a href="/" class="btn">Voltar ao catálogo</a>
    </div>
</body>
</html>
